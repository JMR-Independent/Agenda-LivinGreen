<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistente">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="./chat-manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/images/chat-icon-v3.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/images/chat-icon-v3.png">
<title>Asistente IA</title>
<link rel="stylesheet" href="css/chat.css">
</head>
<body>

<!-- Header -->
<div id="chat-header">
  <div class="logo-wrap" onclick="toggleConvSidebar()" style="cursor:pointer;" title="Historial de conversaciones">
    <img id="header-logo" src="./images/agenda-logo.jpg" alt="logo">
    <div>
      <div class="title" id="header-title">Tyrion</div>
      <div class="subtitle" id="header-sub">LivinGreen</div>
    </div>
  </div>
  <div style="display:flex;gap:4px;">
    <button class="header-btn" onclick="_syncFromSupabase(true)" title="Sincronizar datos">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
    </button>
    <button class="header-btn" onclick="newChat()" title="Nueva conversación">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
    <button class="header-btn" onclick="openApiKeyModal()" title="Configuración">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="header-btn" onclick="window.location.href='index.html'" title="Abrir app">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>App</span>
    </button>
  </div>
</div>

<!-- Messages -->
<div id="messages">
  <div id="empty-state">
    <img src="./images/agenda-logo.jpg" alt="logo">
    <p>¿En qué puedo<br>ayudarte hoy?</p>
  </div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <div class="input-pill">
    <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Adjuntar imagen">
      <span style="font-size:22px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;">+</span>
    </button>
    <button class="attach-btn" id="mic-btn" onclick="startVoiceInput()" title="Voz">
      <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C10.34 2 9 3.34 9 5v6c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-1.66-1.34-3-3-3zm-1 9V5c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1zm6 0c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21H9v2h6v-2h-2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <div id="ai-waveform"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <textarea id="msg-input" placeholder="" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px';_onInputChange();"></textarea>
    <button class="send-btn" id="send-btn" onclick="_sendOrHF()">
      <span id="send-arrow">↑</span>
      <svg id="send-mic-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <rect x="1"  y="9"   width="2.8" height="6"  rx="1.4"/>
        <rect x="5"  y="5"   width="2.8" height="14" rx="1.4"/>
        <rect x="9"  y="2"   width="2.8" height="20" rx="1.4"/>
        <rect x="13" y="4"   width="2.8" height="16" rx="1.4"/>
        <rect x="17" y="7"   width="2.8" height="10" rx="1.4"/>
        <rect x="21" y="10"  width="2.8" height="4"  rx="1.4"/>
      </svg>
    </button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileUpload(event)">


<div id="toast"></div>

<!-- Modal: API Keys -->
<div id="apikey-modal" class="hidden">
  <div id="apikey-box">
    <h3>Configurar API Keys</h3>
    <p>Configura tus claves de API. Se guardan solo en este dispositivo.</p>
    <label>Gemini API Key (requerida — chat)</label>
    <input class="key-input" id="gemini-key-input" type="password" placeholder="AIza..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <label>Groq API Key (opcional — voz e imágenes)</label>
    <input class="key-input" id="groq-key-input" type="password" placeholder="gsk_..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="apikey-save" onclick="saveApiKeys()">Guardar y continuar</button>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/chat.js?v=20260315a"></script>

<!-- ── Artifact panel ── -->
<div id="artifact-backdrop" onclick="closeArtifact()"></div>
<div id="artifact-panel">
  <div class="artifact-handle"></div>
  <div class="artifact-header">
    <div class="artifact-header-left">
      <span class="artifact-title" id="artifact-title">Documento</span>
      <span class="artifact-badge" id="artifact-badge"></span>
    </div>
    <button class="artifact-close" onclick="closeArtifact()">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
    </button>
  </div>
  <div class="artifact-nav" id="artifact-nav" style="display:none">
    <button onclick="_artifactGo(-1)">‹</button>
    <span id="artifact-counter"></span>
    <button onclick="_artifactGo(1)">›</button>
  </div>
  <div class="artifact-tabs" id="artifact-tabs" style="display:none">
    <button class="artifact-tab active" id="tab-preview" onclick="_artifactTab('preview')">Vista previa</button>
    <button class="artifact-tab" id="tab-code" onclick="_artifactTab('code')">Código</button>
  </div>
  <iframe id="artifact-preview" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>
  <div id="artifact-code-wrap"><pre id="artifact-code"></pre></div>
  <div class="artifact-footer">
    <button class="artifact-icon-btn" onclick="_artifactCopy()" title="Copiar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    <button class="artifact-icon-btn" onclick="_artifactDownload()" title="Descargar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    <button class="artifact-icon-btn" id="btn-pdf" onclick="_artifactPrint()" title="Guardar PDF" style="color:#4ade80;border-color:rgba(16,163,127,0.35);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
  </div>
</div>
<!-- Conversation sidebar -->
<div id="conv-overlay" onclick="toggleConvSidebar()"></div>
<div id="conv-sidebar">
  <div class="conv-sidebar-header">
    <span>Conversaciones</span>
    <button class="conv-close-btn" onclick="toggleConvSidebar()">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
    </button>
  </div>
  <div id="conv-list"></div>
</div>
</body>
</html>
